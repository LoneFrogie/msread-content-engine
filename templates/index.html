<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MS. READ Content Engine</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Jost:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet" />
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            /* MS. READ brand colors — from msreadshop.com */
            --brand-black: #151515;
            --brand-coral: #f9765b;
            --brand-coral-light: #fca08c;
            --brand-red: #ee3b45;
            --brand-peach: #f5c3b7;
            --brand-white: #ffffff;
            --brand-offwhite: #f7f7f7;
            --brand-grey: #E2E2E2;
            --brand-dark-grey: #6b6b6b;
            --brand-green: #279A4B;
            --brand-sale: #ab2e1c;
            --error: #ee3b45;
        }

        body {
            font-family: 'Jost', sans-serif;
            background: var(--brand-offwhite);
            color: var(--brand-black);
            min-height: 100vh;
            font-weight: 400;
        }

        .container { max-width: 1100px; margin: 0 auto; padding: 2rem; }

        /* Header */
        .header {
            text-align: center;
            padding: 2.5rem 0 2rem;
            border-bottom: 1px solid var(--brand-grey);
            margin-bottom: 2.5rem;
        }
        .header h1 {
            font-family: 'Jost', sans-serif;
            font-size: 2.6rem;
            font-weight: 500;
            color: var(--brand-black);
            margin-bottom: 0.2rem;
            letter-spacing: 6px;
            text-transform: uppercase;
        }
        .header .tagline {
            color: var(--brand-dark-grey);
            font-size: 0.85rem;
            font-weight: 300;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        .header .subtitle {
            color: var(--brand-coral);
            font-size: 0.95rem;
            font-weight: 400;
            margin-top: 0.6rem;
        }

        /* Card */
        .card {
            background: var(--brand-white);
            border: 1px solid var(--brand-grey);
            border-radius: 0;
            padding: 2rem;
            margin-bottom: 1.5rem;
        }
        .card h2 {
            font-family: 'Jost', sans-serif;
            font-weight: 500;
            color: var(--brand-black);
            font-size: 1.2rem;
            margin-bottom: 1rem;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* Form */
        .brief-input {
            width: 100%;
            min-height: 160px;
            background: var(--brand-offwhite);
            border: 1px solid var(--brand-grey);
            border-radius: 0;
            color: var(--brand-black);
            font-family: 'Jost', sans-serif;
            font-size: 0.95rem;
            padding: 1rem;
            resize: vertical;
            line-height: 1.7;
            transition: border-color 0.2s;
        }
        .brief-input:focus {
            outline: none;
            border-color: var(--brand-black);
        }
        .brief-input::placeholder { color: #999; }

        .examples {
            margin-top: 1rem;
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }
        .example-chip {
            background: transparent;
            border: 1px solid var(--brand-grey);
            color: var(--brand-dark-grey);
            padding: 0.4rem 0.9rem;
            border-radius: 0;
            font-size: 0.78rem;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Jost', sans-serif;
            letter-spacing: 0.3px;
        }
        .example-chip:hover {
            border-color: var(--brand-coral);
            color: var(--brand-coral);
        }

        /* Buttons — sharp corners like msreadshop.com */
        .btn-primary {
            background: var(--brand-black);
            color: var(--brand-white);
            border: none;
            padding: 0.9rem 2.8rem;
            border-radius: 0;
            font-family: 'Jost', sans-serif;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            margin-top: 1.5rem;
            transition: all 0.2s;
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }
        .btn-primary:hover { background: #333; }
        .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }

        .btn-secondary {
            background: transparent;
            color: var(--brand-black);
            border: 1px solid var(--brand-black);
            padding: 0.7rem 2rem;
            border-radius: 0;
            font-family: 'Jost', sans-serif;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .btn-secondary:hover { background: var(--brand-black); color: var(--brand-white); }

        .btn-download {
            background: var(--brand-coral);
            color: var(--brand-white);
            border: none;
            padding: 1rem 2.5rem;
            border-radius: 0;
            font-family: 'Jost', sans-serif;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .btn-download:hover { background: #e5654b; transform: translateY(-1px); box-shadow: 0 4px 16px rgba(249,118,91,0.3); }

        /* Progress */
        .progress-bar-container {
            background: var(--brand-grey);
            border-radius: 0;
            height: 6px;
            overflow: hidden;
            margin: 1rem 0;
        }
        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--brand-coral), var(--brand-coral-light));
            transition: width 0.5s ease;
        }

        .phase-indicator {
            display: flex;
            gap: 0;
            margin-bottom: 2rem;
        }
        .phase-step {
            flex: 1;
            text-align: center;
            padding: 0.8rem 0.5rem;
            font-size: 0.72rem;
            color: var(--brand-dark-grey);
            border-bottom: 2px solid var(--brand-grey);
            transition: all 0.3s;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }
        .phase-step.active {
            color: var(--brand-coral);
            border-bottom-color: var(--brand-coral);
            font-weight: 500;
        }
        .phase-step.done {
            color: var(--brand-green);
            border-bottom-color: var(--brand-green);
        }

        /* Image Grid */
        .image-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 0.8rem;
            margin-top: 1rem;
        }
        .image-slot {
            aspect-ratio: 1;
            background: var(--brand-offwhite);
            border: 1px solid var(--brand-grey);
            border-radius: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
            transition: border-color 0.3s;
        }
        .image-slot.generating {
            border-color: var(--brand-coral);
            animation: pulse-border 1.5s infinite;
        }
        .image-slot.done { border-color: var(--brand-green); }
        .image-slot.failed { border-color: var(--error); }
        .image-slot img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            animation: fadeIn 0.5s ease;
        }
        .image-slot .label {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(transparent, rgba(21,21,21,0.85));
            padding: 2rem 0.6rem 0.5rem;
            font-size: 0.7rem;
            color: var(--brand-white);
        }
        .image-slot .day-badge {
            font-size: 0.68rem;
            color: var(--brand-peach);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        @keyframes pulse-border {
            0%, 100% { border-color: var(--brand-coral); }
            50% { border-color: var(--brand-grey); }
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.97); }
            to { opacity: 1; transform: scale(1); }
        }

        /* Spinner */
        .spinner {
            width: 24px; height: 24px;
            border: 2px solid var(--brand-grey);
            border-top-color: var(--brand-coral);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Log */
        .log-panel {
            background: var(--brand-offwhite);
            border: 1px solid var(--brand-grey);
            border-radius: 0;
            padding: 1rem;
            max-height: 200px;
            overflow-y: auto;
            font-family: 'Jost', sans-serif;
            font-size: 0.8rem;
            color: var(--brand-dark-grey);
            margin-top: 1rem;
        }
        .log-entry { padding: 0.15rem 0; }
        .log-entry.success { color: var(--brand-green); }
        .log-entry.error { color: var(--error); }
        .log-entry .time { color: #aaa; margin-right: 0.5rem; }

        /* Results */
        .results-summary {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 0.8rem;
            margin: 1.5rem 0;
        }
        .stat-card {
            background: var(--brand-offwhite);
            border: 1px solid var(--brand-grey);
            border-radius: 0;
            padding: 1.2rem;
            text-align: center;
        }
        .stat-card .value {
            font-family: 'Jost', sans-serif;
            font-size: 2rem;
            font-weight: 500;
            color: var(--brand-black);
        }
        .stat-card .label {
            font-size: 0.72rem;
            color: var(--brand-dark-grey);
            margin-top: 0.2rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .download-section {
            text-align: center;
            padding: 2rem 0;
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        /* Announcement bar — like msreadshop.com */
        .announcement-bar {
            background: var(--brand-peach);
            text-align: center;
            padding: 0.6rem;
            font-size: 0.78rem;
            color: var(--brand-black);
            letter-spacing: 1px;
            font-weight: 400;
        }

        /* Lightbox */
        .lightbox {
            position: fixed;
            inset: 0;
            background: rgba(21,21,21,0.92);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            cursor: pointer;
        }
        .lightbox img {
            max-width: 90vw;
            max-height: 90vh;
        }

        /* Footer */
        .footer {
            text-align: center;
            padding: 2rem 0 1rem;
            color: var(--brand-dark-grey);
            font-size: 0.75rem;
            border-top: 1px solid var(--brand-grey);
            margin-top: 2rem;
            letter-spacing: 0.5px;
        }
        .footer a { color: var(--brand-coral); text-decoration: none; }
        .footer a:hover { text-decoration: underline; }

        /* Responsive */
        @media (max-width: 600px) {
            .container { padding: 1rem; }
            .header h1 { font-size: 1.6rem; letter-spacing: 4px; }
            .image-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>
<div class="announcement-bar">FASHION THAT FITS YOUR CONFIDENCE &mdash; AI-POWERED CONTENT ENGINE</div>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

const EXAMPLE_BRIEFS = [
    "Focus on Raya collection. Highlight baju kurung and modest fashion in emerald, pastel pink, and gold. Target working women preparing for Hari Raya celebrations.",
    "Back-to-work January campaign. Power dressing for plus-size corporate women. Blazers, structured dresses, wide-leg trousers. Empowering and professional.",
    "Summer casual collection. Lightweight fabrics, linen dresses, vacation-ready outfits. Beach to brunch styling for curvy women. Fun and carefree energy.",
    "New activewear line launch. Gym-to-street styling for plus-size women. Bold colors, supportive fits, confidence-boosting athletic wear.",
    "Year-end party season. Evening gowns, cocktail dresses, festive outfits. Sparkle, glamour, and holiday celebration vibes for every size.",
];

function App() {
    const [view, setView] = useState("input");
    const [brief, setBrief] = useState("");
    const [sessionId, setSessionId] = useState(null);
    const [events, setEvents] = useState([]);
    const [images, setImages] = useState({});
    const [currentPhase, setCurrentPhase] = useState("");
    const [imageProgress, setImageProgress] = useState({ current: 0, total: 13 });
    const [error, setError] = useState(null);
    const [lightbox, setLightbox] = useState(null);
    const [startTime, setStartTime] = useState(null);
    const [endTime, setEndTime] = useState(null);
    const logRef = useRef(null);

    useEffect(() => {
        if (logRef.current) logRef.current.scrollTop = logRef.current.scrollHeight;
    }, [events]);

    async function handleGenerate() {
        if (!brief.trim()) return;
        setError(null); setEvents([]); setImages({});
        setCurrentPhase("adapting");
        setImageProgress({ current: 0, total: 13 });
        setStartTime(Date.now()); setEndTime(null);

        try {
            const res = await fetch("/api/generate", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ creative_brief: brief }),
            });
            if (!res.ok) { setError((await res.json()).detail || "Failed"); return; }

            const { session_id } = await res.json();
            setSessionId(session_id); setView("progress");

            const es = new EventSource(`/api/progress/${session_id}`);
            es.onmessage = (e) => {
                const ev = JSON.parse(e.data);
                if (ev.type === "stream_end") {
                    es.close();
                    if (ev.status === "done") { setEndTime(Date.now()); setView("results"); }
                    else setError("Generation failed. Check the log.");
                    return;
                }
                setEvents((prev) => [...prev, ev]);
                if (ev.type === "status" && ev.phase) setCurrentPhase(ev.phase);
                if (ev.type === "image_start") {
                    setImageProgress({ current: ev.index, total: ev.total });
                    setImages((prev) => ({ ...prev, [ev.day]: { status: "generating", theme: ev.theme } }));
                }
                if (ev.type === "image_done") {
                    setImageProgress({ current: ev.index + 1, total: ev.total });
                    setImages((prev) => ({ ...prev, [ev.day]: { status: ev.success ? "done" : "failed", theme: ev.theme, filename: ev.filename } }));
                }
                if (ev.type === "error") setError(ev.message);
            };
            es.onerror = () => es.close();
        } catch (err) { setError("Network error: " + err.message); }
    }

    function resetToInput() {
        setView("input"); setBrief(""); setSessionId(null); setEvents([]); setImages({});
        setCurrentPhase(""); setError(null); setStartTime(null); setEndTime(null);
    }

    const phases = [
        { key: "adapting", label: "Adapting" },
        { key: "building_excel", label: "Excel" },
        { key: "generating_images", label: "Images" },
        { key: "embedding", label: "Embed" },
        { key: "packaging", label: "Package" },
        { key: "done", label: "Done" },
    ];
    const phaseOrder = phases.map(p => p.key);
    const currentPhaseIdx = phaseOrder.indexOf(currentPhase);

    const overallProgress = (() => {
        if (currentPhase === "done") return 100;
        if (currentPhase === "packaging") return 95;
        if (currentPhase === "embedding") return 90;
        if (currentPhase === "generating_images")
            return 20 + (imageProgress.current / Math.max(imageProgress.total, 1)) * 70;
        if (currentPhase === "building_excel" || currentPhase === "excel_done") return 18;
        if (currentPhase === "adapted" || currentPhase === "adapting") return 8;
        return 0;
    })();

    const duration = endTime && startTime ? Math.round((endTime - startTime) / 1000) : null;
    const imagesDone = Object.values(images).filter(i => i.status === "done").length;

    return (
        <div className="container">
            <div className="header">
                <h1>MS. READ</h1>
                <div className="tagline">Fashion That Fits Your Confidence</div>
                <div className="subtitle">30-Day Content Engine</div>
            </div>

            {error && (
                <div className="card" style={{ borderColor: "var(--error)", borderWidth: 2 }}>
                    <p style={{ color: "var(--error)" }}>{error}</p>
                </div>
            )}

            {view === "input" && (
                <>
                    <div className="card">
                        <h2>Creative Direction</h2>
                        <p style={{ color: "var(--brand-dark-grey)", fontSize: "0.88rem", marginBottom: "1rem", lineHeight: 1.6 }}>
                            Describe your campaign focus &mdash; products, themes, seasonal events, or goals. The engine will adapt all 30 days of content, blog, captions, and images to match.
                        </p>
                        <textarea
                            className="brief-input"
                            placeholder={"Example: Focus on our Raya collection launch. Highlight modest fashion pieces \u2014 baju kurung, flowing maxi dresses, hijab-friendly designs in pastel and jewel tones. Campaign goal: drive pre-orders and in-store visits during Ramadan."}
                            value={brief}
                            onChange={(e) => setBrief(e.target.value)}
                        />
                        <div className="examples">
                            {EXAMPLE_BRIEFS.map((ex, i) => (
                                <button key={i} className="example-chip" onClick={() => setBrief(ex)}>
                                    {ex.slice(0, 42)}...
                                </button>
                            ))}
                        </div>
                        <button className="btn-primary" onClick={handleGenerate} disabled={!brief.trim()}>
                            Generate Content Engine
                        </button>
                    </div>

                    <div className="card">
                        <h2>What You'll Get</h2>
                        <div className="results-summary">
                            <div className="stat-card"><div className="value">6</div><div className="label">Excel Sheets</div></div>
                            <div className="stat-card"><div className="value">30</div><div className="label">Days of Content</div></div>
                            <div className="stat-card"><div className="value">13</div><div className="label">AI Images</div></div>
                            <div className="stat-card"><div className="value">1</div><div className="label">SEO Blog Post</div></div>
                            <div className="stat-card"><div className="value">4</div><div className="label">FB Captions</div></div>
                        </div>
                    </div>
                </>
            )}

            {view === "progress" && (
                <>
                    <div className="card">
                        <h2>Generating Your Content Pack</h2>
                        <div className="phase-indicator">
                            {phases.map((p, i) => (
                                <div key={p.key} className={`phase-step ${i < currentPhaseIdx ? "done" : ""} ${i === currentPhaseIdx ? "active" : ""}`}>
                                    {i < currentPhaseIdx ? "\u2713 " : ""}{p.label}
                                </div>
                            ))}
                        </div>
                        <div className="progress-bar-container">
                            <div className="progress-bar-fill" style={{ width: `${overallProgress}%` }} />
                        </div>
                        <p style={{ textAlign: "center", color: "var(--brand-dark-grey)", fontSize: "0.85rem" }}>
                            {Math.round(overallProgress)}% complete
                            {currentPhase === "generating_images" && ` \u2014 Image ${imageProgress.current}/${imageProgress.total}`}
                        </p>
                    </div>

                    {Object.keys(images).length > 0 && (
                        <div className="card">
                            <h2>Image Generation ({imagesDone}/{imageProgress.total})</h2>
                            <div className="image-grid">
                                {Object.entries(images).sort(([a],[b]) => Number(a)-Number(b)).map(([day, img]) => (
                                    <div key={day} className={`image-slot ${img.status}`}>
                                        {img.status === "generating" && <div className="spinner" />}
                                        {img.status === "done" && img.filename && (
                                            <img src={`/api/images/${sessionId}/${img.filename}`} alt={img.theme}
                                                onClick={() => setLightbox(`/api/images/${sessionId}/${img.filename}`)}
                                                style={{ cursor: "pointer" }} />
                                        )}
                                        {img.status === "failed" && <span style={{ color: "var(--error)", fontSize: "0.75rem" }}>Failed</span>}
                                        <div className="label"><span className="day-badge">Day {day}</span><br />{img.theme}</div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}

                    <div className="card">
                        <h2>Activity Log</h2>
                        <div className="log-panel" ref={logRef}>
                            {events.map((e, i) => (
                                <div key={i} className={`log-entry ${e.type === "error" ? "error" : e.success === true ? "success" : ""}`}>
                                    <span className="time">{new Date(e.timestamp).toLocaleTimeString()}</span>
                                    {e.message}
                                </div>
                            ))}
                        </div>
                    </div>
                </>
            )}

            {view === "results" && (
                <>
                    <div className="card" style={{ textAlign: "center" }}>
                        <h2 style={{ fontSize: "1.4rem", marginBottom: "0.5rem" }}>Content Pack Ready</h2>
                        <p style={{ color: "var(--brand-dark-grey)" }}>Your 30-day content engine has been generated.</p>
                        <div className="results-summary">
                            <div className="stat-card"><div className="value">6</div><div className="label">Excel Sheets</div></div>
                            <div className="stat-card"><div className="value">30</div><div className="label">Days Planned</div></div>
                            <div className="stat-card"><div className="value">{imagesDone}</div><div className="label">Images</div></div>
                            {duration && (
                                <div className="stat-card">
                                    <div className="value">{Math.floor(duration/60)}:{String(duration%60).padStart(2,'0')}</div>
                                    <div className="label">Total Time</div>
                                </div>
                            )}
                        </div>
                        <div className="download-section">
                            <button className="btn-download" onClick={() => window.location.href = `/api/download/${sessionId}`}>
                                Download Full Pack (.zip)
                            </button>
                            <button className="btn-download" style={{ background: "var(--brand-black)" }}
                                onClick={() => window.location.href = `/api/download-excel/${sessionId}`}>
                                Download Excel Only
                            </button>
                        </div>
                    </div>

                    {Object.keys(images).length > 0 && (
                        <div className="card">
                            <h2>Generated Images</h2>
                            <div className="image-grid">
                                {Object.entries(images)
                                    .filter(([_, img]) => img.status === "done" && img.filename)
                                    .sort(([a],[b]) => Number(a)-Number(b))
                                    .map(([day, img]) => (
                                        <div key={day} className="image-slot done" style={{ cursor: "pointer" }}
                                            onClick={() => setLightbox(`/api/images/${sessionId}/${img.filename}`)}>
                                            <img src={`/api/images/${sessionId}/${img.filename}`} alt={img.theme} />
                                            <div className="label"><span className="day-badge">Day {day}</span><br />{img.theme}</div>
                                        </div>
                                    ))}
                            </div>
                        </div>
                    )}

                    <div style={{ textAlign: "center", marginTop: "1rem" }}>
                        <button className="btn-secondary" onClick={resetToInput}>Generate Another</button>
                    </div>
                </>
            )}

            {lightbox && (
                <div className="lightbox" onClick={() => setLightbox(null)}>
                    <img src={lightbox} alt="Preview" />
                </div>
            )}

            <div className="footer">
                MS. READ &copy; {new Date().getFullYear()} &mdash; Powered by BettieAI &mdash; <a href="https://www.msreadshop.com" target="_blank">msreadshop.com</a>
            </div>
        </div>
    );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
