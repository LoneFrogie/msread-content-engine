<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MS. READ Content Engine</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Jost:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet" />
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --brand-black: #151515;
            --brand-coral: #f9765b;
            --brand-coral-light: #fca08c;
            --brand-red: #ee3b45;
            --brand-peach: #f5c3b7;
            --brand-white: #ffffff;
            --brand-offwhite: #f7f7f7;
            --brand-grey: #E2E2E2;
            --brand-dark-grey: #6b6b6b;
            --brand-green: #279A4B;
            --brand-sale: #ab2e1c;
            --error: #ee3b45;
        }

        body {
            font-family: 'Jost', sans-serif;
            background: var(--brand-offwhite);
            color: var(--brand-black);
            min-height: 100vh;
            font-weight: 400;
        }

        .container { max-width: 1100px; margin: 0 auto; padding: 2rem; }

        /* Header */
        .header {
            text-align: center;
            padding: 2.5rem 0 2rem;
            border-bottom: 1px solid var(--brand-grey);
            margin-bottom: 2.5rem;
        }
        .header h1 {
            font-family: 'Jost', sans-serif;
            font-size: 2.6rem;
            font-weight: 500;
            color: var(--brand-black);
            margin-bottom: 0.2rem;
            letter-spacing: 6px;
            text-transform: uppercase;
        }
        .header .tagline {
            color: var(--brand-dark-grey);
            font-size: 0.85rem;
            font-weight: 300;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        .header .subtitle {
            color: var(--brand-coral);
            font-size: 0.95rem;
            font-weight: 400;
            margin-top: 0.6rem;
        }

        /* Mode Tabs */
        .mode-tabs {
            display: flex;
            gap: 0;
            margin-bottom: 2rem;
            border-bottom: 2px solid var(--brand-grey);
        }
        .mode-tab {
            flex: 1;
            text-align: center;
            padding: 1rem 1.5rem;
            font-family: 'Jost', sans-serif;
            font-size: 0.88rem;
            font-weight: 500;
            color: var(--brand-dark-grey);
            letter-spacing: 1.5px;
            text-transform: uppercase;
            cursor: pointer;
            border: none;
            background: none;
            border-bottom: 2px solid transparent;
            margin-bottom: -2px;
            transition: all 0.2s;
        }
        .mode-tab:hover { color: var(--brand-black); }
        .mode-tab.active {
            color: var(--brand-black);
            border-bottom-color: var(--brand-coral);
        }
        .mode-tab .tab-desc {
            display: block;
            font-size: 0.72rem;
            font-weight: 300;
            color: var(--brand-dark-grey);
            margin-top: 0.2rem;
            letter-spacing: 0.5px;
            text-transform: none;
        }

        /* Card */
        .card {
            background: var(--brand-white);
            border: 1px solid var(--brand-grey);
            border-radius: 0;
            padding: 2rem;
            margin-bottom: 1.5rem;
        }
        .card h2 {
            font-family: 'Jost', sans-serif;
            font-weight: 500;
            color: var(--brand-black);
            font-size: 1.2rem;
            margin-bottom: 1rem;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* Form */
        .brief-input, .url-input {
            width: 100%;
            background: var(--brand-offwhite);
            border: 1px solid var(--brand-grey);
            border-radius: 0;
            color: var(--brand-black);
            font-family: 'Jost', sans-serif;
            font-size: 0.95rem;
            padding: 1rem;
            resize: vertical;
            line-height: 1.7;
            transition: border-color 0.2s;
        }
        .brief-input { min-height: 160px; }
        .url-input { min-height: auto; resize: none; margin-bottom: 1rem; }
        .brief-input:focus, .url-input:focus {
            outline: none;
            border-color: var(--brand-black);
        }
        .brief-input::placeholder, .url-input::placeholder { color: #999; }

        .form-label {
            display: block;
            font-size: 0.82rem;
            font-weight: 500;
            color: var(--brand-black);
            margin-bottom: 0.5rem;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }
        .form-hint {
            font-size: 0.78rem;
            color: var(--brand-dark-grey);
            margin-bottom: 0.5rem;
            line-height: 1.5;
        }

        .examples {
            margin-top: 1rem;
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }
        .example-chip {
            background: transparent;
            border: 1px solid var(--brand-grey);
            color: var(--brand-dark-grey);
            padding: 0.4rem 0.9rem;
            border-radius: 0;
            font-size: 0.78rem;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Jost', sans-serif;
            letter-spacing: 0.3px;
        }
        .example-chip:hover {
            border-color: var(--brand-coral);
            color: var(--brand-coral);
        }

        /* Product Preview */
        .product-preview {
            display: flex;
            gap: 1.5rem;
            padding: 1rem;
            background: var(--brand-offwhite);
            border: 1px solid var(--brand-grey);
            margin-bottom: 1rem;
        }
        .product-preview img {
            width: 100px;
            height: 100px;
            object-fit: cover;
        }
        .product-preview .product-info { flex: 1; }
        .product-preview .product-name {
            font-weight: 500;
            font-size: 1rem;
            margin-bottom: 0.3rem;
        }
        .product-preview .product-price {
            font-size: 1.1rem;
            font-weight: 500;
            color: var(--brand-coral);
        }
        .product-preview .product-price .compare {
            text-decoration: line-through;
            color: var(--brand-dark-grey);
            font-weight: 300;
            font-size: 0.9rem;
            margin-left: 0.5rem;
        }
        .product-preview .product-meta {
            font-size: 0.8rem;
            color: var(--brand-dark-grey);
            margin-top: 0.3rem;
        }

        /* Buttons */
        .btn-primary {
            background: var(--brand-black);
            color: var(--brand-white);
            border: none;
            padding: 0.9rem 2.8rem;
            border-radius: 0;
            font-family: 'Jost', sans-serif;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            margin-top: 1.5rem;
            transition: all 0.2s;
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }
        .btn-primary:hover { background: #333; }
        .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }

        .btn-secondary {
            background: transparent;
            color: var(--brand-black);
            border: 1px solid var(--brand-black);
            padding: 0.7rem 2rem;
            border-radius: 0;
            font-family: 'Jost', sans-serif;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .btn-secondary:hover { background: var(--brand-black); color: var(--brand-white); }

        .btn-download {
            background: var(--brand-coral);
            color: var(--brand-white);
            border: none;
            padding: 1rem 2.5rem;
            border-radius: 0;
            font-family: 'Jost', sans-serif;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .btn-download:hover { background: #e5654b; transform: translateY(-1px); box-shadow: 0 4px 16px rgba(249,118,91,0.3); }

        /* Progress */
        .progress-bar-container {
            background: var(--brand-grey);
            border-radius: 0;
            height: 6px;
            overflow: hidden;
            margin: 1rem 0;
        }
        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--brand-coral), var(--brand-coral-light));
            transition: width 0.5s ease;
        }

        .phase-indicator {
            display: flex;
            gap: 0;
            margin-bottom: 2rem;
        }
        .phase-step {
            flex: 1;
            text-align: center;
            padding: 0.8rem 0.5rem;
            font-size: 0.72rem;
            color: var(--brand-dark-grey);
            border-bottom: 2px solid var(--brand-grey);
            transition: all 0.3s;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }
        .phase-step.active {
            color: var(--brand-coral);
            border-bottom-color: var(--brand-coral);
            font-weight: 500;
        }
        .phase-step.done {
            color: var(--brand-green);
            border-bottom-color: var(--brand-green);
        }

        /* Image Grid */
        .image-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 0.8rem;
            margin-top: 1rem;
        }
        .image-slot {
            aspect-ratio: 1;
            background: var(--brand-offwhite);
            border: 1px solid var(--brand-grey);
            border-radius: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
            transition: border-color 0.3s;
        }
        .image-slot.generating {
            border-color: var(--brand-coral);
            animation: pulse-border 1.5s infinite;
        }
        .image-slot.done { border-color: var(--brand-green); }
        .image-slot.failed { border-color: var(--error); }
        .image-slot img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            animation: fadeIn 0.5s ease;
        }
        .image-slot .label {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(transparent, rgba(21,21,21,0.85));
            padding: 2rem 0.6rem 0.5rem;
            font-size: 0.7rem;
            color: var(--brand-white);
        }
        .image-slot .day-badge {
            font-size: 0.68rem;
            color: var(--brand-peach);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        @keyframes pulse-border {
            0%, 100% { border-color: var(--brand-coral); }
            50% { border-color: var(--brand-grey); }
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.97); }
            to { opacity: 1; transform: scale(1); }
        }

        /* Spinner */
        .spinner {
            width: 24px; height: 24px;
            border: 2px solid var(--brand-grey);
            border-top-color: var(--brand-coral);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Log */
        .log-panel {
            background: var(--brand-offwhite);
            border: 1px solid var(--brand-grey);
            border-radius: 0;
            padding: 1rem;
            max-height: 200px;
            overflow-y: auto;
            font-family: 'Jost', sans-serif;
            font-size: 0.8rem;
            color: var(--brand-dark-grey);
            margin-top: 1rem;
        }
        .log-entry { padding: 0.15rem 0; }
        .log-entry.success { color: var(--brand-green); }
        .log-entry.error { color: var(--error); }
        .log-entry .time { color: #aaa; margin-right: 0.5rem; }

        /* Results */
        .results-summary {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 0.8rem;
            margin: 1.5rem 0;
        }
        .stat-card {
            background: var(--brand-offwhite);
            border: 1px solid var(--brand-grey);
            border-radius: 0;
            padding: 1.2rem;
            text-align: center;
        }
        .stat-card .value {
            font-family: 'Jost', sans-serif;
            font-size: 2rem;
            font-weight: 500;
            color: var(--brand-black);
        }
        .stat-card .label {
            font-size: 0.72rem;
            color: var(--brand-dark-grey);
            margin-top: 0.2rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .download-section {
            text-align: center;
            padding: 2rem 0;
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        /* Announcement bar */
        .announcement-bar {
            background: var(--brand-peach);
            text-align: center;
            padding: 0.6rem;
            font-size: 0.78rem;
            color: var(--brand-black);
            letter-spacing: 1px;
            font-weight: 400;
        }

        /* Lightbox */
        .lightbox {
            position: fixed;
            inset: 0;
            background: rgba(21,21,21,0.92);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            cursor: pointer;
        }
        .lightbox img {
            max-width: 90vw;
            max-height: 90vh;
        }

        /* Footer */
        .footer {
            text-align: center;
            padding: 2rem 0 1rem;
            color: var(--brand-dark-grey);
            font-size: 0.75rem;
            border-top: 1px solid var(--brand-grey);
            margin-top: 2rem;
            letter-spacing: 0.5px;
        }
        .footer a { color: var(--brand-coral); text-decoration: none; }
        .footer a:hover { text-decoration: underline; }

        /* Avatar Selection */
        .avatar-section { margin-top: 1.5rem; }
        .avatar-grid {
            display: flex;
            gap: 1rem;
            margin-top: 0.8rem;
        }
        .avatar-slot {
            flex: 1;
            border: 2px solid var(--brand-grey);
            background: var(--brand-offwhite);
            position: relative;
            text-align: center;
            transition: all 0.2s;
            min-height: 200px;
            display: flex;
            flex-direction: column;
        }
        .avatar-slot.selected { border-color: var(--brand-coral); }
        .avatar-slot .avatar-preview {
            width: 100%;
            aspect-ratio: 3/4;
            object-fit: cover;
            display: block;
        }
        .avatar-slot .avatar-placeholder {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--brand-dark-grey);
            font-size: 0.82rem;
            padding: 1rem;
            cursor: pointer;
        }
        .avatar-slot .avatar-placeholder .upload-icon {
            font-size: 2rem;
            margin-bottom: 0.5rem;
            color: var(--brand-grey);
        }
        .avatar-slot .avatar-controls {
            display: flex;
            border-top: 1px solid var(--brand-grey);
        }
        .avatar-slot .avatar-controls button {
            flex: 1;
            padding: 0.5rem;
            border: none;
            background: none;
            font-family: 'Jost', sans-serif;
            font-size: 0.72rem;
            cursor: pointer;
            color: var(--brand-dark-grey);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: all 0.15s;
        }
        .avatar-slot .avatar-controls button:hover { background: var(--brand-offwhite); }
        .avatar-slot .avatar-controls button.select-btn { color: var(--brand-coral); font-weight: 500; }
        .avatar-slot .avatar-controls button.select-btn.active { background: var(--brand-coral); color: white; }
        .avatar-slot .avatar-controls button.remove-btn:hover { color: var(--error); }
        .avatar-slot .avatar-label {
            font-size: 0.75rem;
            color: var(--brand-dark-grey);
            padding: 0.3rem 0;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            background: var(--brand-white);
            border-top: 1px solid var(--brand-grey);
        }
        .avatar-slot .avatar-badge {
            position: absolute;
            top: 6px;
            right: 6px;
            background: var(--brand-coral);
            color: white;
            font-size: 0.65rem;
            padding: 0.15rem 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .avatar-hint {
            font-size: 0.75rem;
            color: var(--brand-dark-grey);
            margin-top: 0.5rem;
            font-style: italic;
        }

        /* Responsive */
        @media (max-width: 600px) {
            .container { padding: 1rem; }
            .header h1 { font-size: 1.6rem; letter-spacing: 4px; }
            .image-grid { grid-template-columns: repeat(2, 1fr); }
            .mode-tab { font-size: 0.75rem; padding: 0.8rem 0.5rem; letter-spacing: 0.8px; }
            .mode-tab .tab-desc { font-size: 0.65rem; }
            .product-preview { flex-direction: column; }
            .product-preview img { width: 100%; height: 200px; }
            .avatar-grid { flex-direction: column; }
            .avatar-slot { min-height: 160px; }
        }
    </style>
</head>
<body>
<div class="announcement-bar">FASHION THAT FITS YOUR CONFIDENCE &mdash; AI-POWERED CONTENT ENGINE</div>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

// ── Avatar helpers ──
const AVATAR_STORAGE_KEY = "msread_avatars";
const MAX_AVATAR_PX = 600; // resize uploaded images to this max dimension

function loadAvatarsFromStorage() {
    try {
        const stored = localStorage.getItem(AVATAR_STORAGE_KEY);
        if (stored) return JSON.parse(stored);
    } catch (e) {}
    return [null, null, null]; // 3 slots
}

function saveAvatarsToStorage(avatars) {
    try {
        localStorage.setItem(AVATAR_STORAGE_KEY, JSON.stringify(avatars));
    } catch (e) {
        console.warn("localStorage full, avatar not saved");
    }
}

function resizeImageToBase64(file, maxPx) {
    return new Promise((resolve) => {
        const reader = new FileReader();
        reader.onload = (e) => {
            const img = new Image();
            img.onload = () => {
                const canvas = document.createElement("canvas");
                let w = img.width, h = img.height;
                if (Math.max(w, h) > maxPx) {
                    const ratio = maxPx / Math.max(w, h);
                    w = Math.round(w * ratio);
                    h = Math.round(h * ratio);
                }
                canvas.width = w;
                canvas.height = h;
                canvas.getContext("2d").drawImage(img, 0, 0, w, h);
                resolve(canvas.toDataURL("image/png"));
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);
    });
}

const EXAMPLE_BRIEFS = [
    "Focus on Raya collection. Highlight baju kurung and modest fashion in emerald, pastel pink, and gold. Target working women preparing for Hari Raya celebrations.",
    "Back-to-work January campaign. Power dressing for plus-size corporate women. Blazers, structured dresses, wide-leg trousers. Empowering and professional.",
    "Summer casual collection. Lightweight fabrics, linen dresses, vacation-ready outfits. Beach to brunch styling for curvy women. Fun and carefree energy.",
    "New activewear line launch. Gym-to-street styling for plus-size women. Bold colors, supportive fits, confidence-boosting athletic wear.",
    "Year-end party season. Evening gowns, cocktail dresses, festive outfits. Sparkle, glamour, and holiday celebration vibes for every size.",
];

const CALENDAR_PHASES = [
    { key: "adapting", label: "Adapting" },
    { key: "building_excel", label: "Excel" },
    { key: "generating_images", label: "Images" },
    { key: "embedding", label: "Embed" },
    { key: "packaging", label: "Package" },
    { key: "done", label: "Done" },
];

const SKU_PHASES = [
    { key: "fetching_product", label: "Fetch" },
    { key: "generating_content", label: "Content" },
    { key: "building_excel", label: "Excel" },
    { key: "generating_images", label: "Images" },
    { key: "packaging", label: "Package" },
    { key: "done", label: "Done" },
];

function App() {
    const [mode, setMode] = useState("calendar"); // "calendar" | "sku"
    const [view, setView] = useState("input");
    const [brief, setBrief] = useState("");
    const [productUrl, setProductUrl] = useState("");
    const [productPreview, setProductPreview] = useState(null);

    // Avatar state: array of 3 slots, each null or base64 string
    const [avatars, setAvatars] = useState(loadAvatarsFromStorage);
    const [selectedAvatars, setSelectedAvatars] = useState(() => {
        // Auto-select any pre-loaded avatars
        const stored = loadAvatarsFromStorage();
        const sel = new Set();
        stored.forEach((a, i) => { if (a) sel.add(i); });
        return sel;
    });
    const avatarFileRefs = [useRef(null), useRef(null), useRef(null)];
    const [sessionId, setSessionId] = useState(null);
    const [activeMode, setActiveMode] = useState("calendar");
    const [events, setEvents] = useState([]);
    const [images, setImages] = useState({});
    const [currentPhase, setCurrentPhase] = useState("");
    const [imageProgress, setImageProgress] = useState({ current: 0, total: 13 });
    const [error, setError] = useState(null);
    const [lightbox, setLightbox] = useState(null);
    const [startTime, setStartTime] = useState(null);
    const [endTime, setEndTime] = useState(null);
    const logRef = useRef(null);

    useEffect(() => {
        if (logRef.current) logRef.current.scrollTop = logRef.current.scrollHeight;
    }, [events]);

    // ── Calendar Generation ──
    async function handleGenerateCalendar() {
        if (!brief.trim()) return;
        _resetProgress("calendar");

        try {
            const res = await fetch("/api/generate", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ creative_brief: brief }),
            });
            if (!res.ok) { setError((await res.json()).detail || "Failed"); return; }

            const { session_id } = await res.json();
            setSessionId(session_id);
            setActiveMode("calendar");
            setView("progress");
            _listenToProgress(session_id);
        } catch (err) { setError("Network error: " + err.message); }
    }

    // ── SKU Generation ──
    async function handleGenerateSku() {
        if (!productUrl.trim()) return;
        _resetProgress("sku");

        // Collect selected avatar base64 data
        const avatarData = [];
        selectedAvatars.forEach(idx => {
            if (avatars[idx]) avatarData.push(avatars[idx]);
        });

        try {
            const res = await fetch("/api/generate-sku", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    product_url: productUrl,
                    creative_brief: brief,
                    avatar_images: avatarData,
                }),
            });
            if (!res.ok) { setError((await res.json()).detail || "Failed"); return; }

            const { session_id } = await res.json();
            setSessionId(session_id);
            setActiveMode("sku");
            setView("progress");
            _listenToProgress(session_id);
        } catch (err) { setError("Network error: " + err.message); }
    }

    function _resetProgress(m) {
        setError(null);
        setEvents([]);
        setImages({});
        setCurrentPhase(m === "sku" ? "fetching_product" : "adapting");
        setImageProgress({ current: 0, total: m === "sku" ? 4 : 30 });
        setStartTime(Date.now());
        setEndTime(null);
        setProductPreview(null);
    }

    function _listenToProgress(session_id) {
        const es = new EventSource(`/api/progress/${session_id}`);
        es.onmessage = (e) => {
            const ev = JSON.parse(e.data);
            if (ev.type === "stream_end") {
                es.close();
                if (ev.status === "done") { setEndTime(Date.now()); setView("results"); }
                else setError("Generation failed. Check the log.");
                return;
            }
            setEvents((prev) => [...prev, ev]);
            if (ev.type === "status" && ev.phase) {
                setCurrentPhase(ev.phase);
                // Capture product preview from the fetch phase
                if (ev.product) setProductPreview(ev.product);
            }
            if (ev.type === "image_start") {
                setImageProgress({ current: ev.index, total: ev.total });
                setImages((prev) => ({ ...prev, [ev.day]: { status: "generating", theme: ev.theme } }));
            }
            if (ev.type === "image_done") {
                setImageProgress({ current: ev.index + 1, total: ev.total });
                setImages((prev) => ({ ...prev, [ev.day]: { status: ev.success ? "done" : "failed", theme: ev.theme, filename: ev.filename } }));
            }
            if (ev.type === "error") setError(ev.message);
        };
        es.onerror = () => es.close();
    }

    // ── Avatar handlers ──
    async function handleAvatarUpload(slotIndex, e) {
        const file = e.target.files[0];
        if (!file) return;
        const b64 = await resizeImageToBase64(file, MAX_AVATAR_PX);
        const updated = [...avatars];
        updated[slotIndex] = b64;
        setAvatars(updated);
        saveAvatarsToStorage(updated);
        // Auto-select on upload
        setSelectedAvatars(prev => { const s = new Set(prev); s.add(slotIndex); return s; });
    }

    function handleAvatarRemove(slotIndex) {
        const updated = [...avatars];
        updated[slotIndex] = null;
        setAvatars(updated);
        saveAvatarsToStorage(updated);
        setSelectedAvatars(prev => { const s = new Set(prev); s.delete(slotIndex); return s; });
    }

    function toggleAvatarSelect(slotIndex) {
        if (!avatars[slotIndex]) return; // can't select empty slot
        setSelectedAvatars(prev => {
            const s = new Set(prev);
            if (s.has(slotIndex)) {
                if (s.size > 1) s.delete(slotIndex); // min 1
            } else {
                s.add(slotIndex);
            }
            return s;
        });
    }

    function resetToInput() {
        setView("input");
        setBrief("");
        setProductUrl("");
        setProductPreview(null);
        setSessionId(null);
        setEvents([]);
        setImages({});
        setCurrentPhase("");
        setError(null);
        setStartTime(null);
        setEndTime(null);
    }

    const phases = activeMode === "sku" ? SKU_PHASES : CALENDAR_PHASES;
    const phaseOrder = phases.map(p => p.key);
    const currentPhaseIdx = phaseOrder.indexOf(currentPhase);

    const overallProgress = (() => {
        if (currentPhase === "done") return 100;
        if (currentPhase === "packaging") return 95;
        if (currentPhase === "embedding") return 90;
        if (currentPhase === "generating_images") {
            const base = activeMode === "sku" ? 50 : 20;
            const range = activeMode === "sku" ? 40 : 70;
            return base + (imageProgress.current / Math.max(imageProgress.total, 1)) * range;
        }
        if (currentPhase === "building_excel" || currentPhase === "excel_done")
            return activeMode === "sku" ? 40 : 18;
        if (currentPhase === "content_generated" || currentPhase === "generating_content")
            return activeMode === "sku" ? 25 : 0;
        if (currentPhase === "product_fetched" || currentPhase === "fetching_product")
            return activeMode === "sku" ? 10 : 0;
        if (currentPhase === "adapted" || currentPhase === "adapting") return 8;
        return 0;
    })();

    const duration = endTime && startTime ? Math.round((endTime - startTime) / 1000) : null;
    const imagesDone = Object.values(images).filter(i => i.status === "done").length;

    return (
        <div className="container">
            <div className="header">
                <h1>MS. READ</h1>
                <div className="tagline">Fashion That Fits Your Confidence</div>
                <div className="subtitle">AI-Powered Content Engine</div>
            </div>

            {error && (
                <div className="card" style={{ borderColor: "var(--error)", borderWidth: 2 }}>
                    <p style={{ color: "var(--error)" }}>{error}</p>
                </div>
            )}

            {view === "input" && (
                <>
                    {/* Mode Tabs */}
                    <div className="mode-tabs">
                        <button className={`mode-tab ${mode === "calendar" ? "active" : ""}`} onClick={() => setMode("calendar")}>
                            30-Day Content Calendar
                            <span className="tab-desc">Full month of posts, blog, images & captions</span>
                        </button>
                        <button className={`mode-tab ${mode === "sku" ? "active" : ""}`} onClick={() => setMode("sku")}>
                            SKU Product Content
                            <span className="tab-desc">Blog, social, descriptions & email for one product</span>
                        </button>
                    </div>

                    {/* ── CALENDAR MODE ── */}
                    {mode === "calendar" && (
                        <>
                            <div className="card">
                                <h2>Creative Direction</h2>
                                <p className="form-hint">
                                    Describe your campaign focus &mdash; products, themes, seasonal events, or goals. The engine will adapt all 30 days of content, blog, captions, and images to match.
                                </p>
                                <textarea
                                    className="brief-input"
                                    placeholder={"Example: Focus on our Raya collection launch. Highlight modest fashion pieces \u2014 baju kurung, flowing maxi dresses, hijab-friendly designs in pastel and jewel tones. Campaign goal: drive pre-orders and in-store visits during Ramadan."}
                                    value={brief}
                                    onChange={(e) => setBrief(e.target.value)}
                                />
                                <div className="examples">
                                    {EXAMPLE_BRIEFS.map((ex, i) => (
                                        <button key={i} className="example-chip" onClick={() => setBrief(ex)}>
                                            {ex.slice(0, 42)}...
                                        </button>
                                    ))}
                                </div>
                                <button className="btn-primary" onClick={handleGenerateCalendar} disabled={!brief.trim()}>
                                    Generate 30-Day Calendar
                                </button>
                            </div>

                            <div className="card">
                                <h2>What You'll Get</h2>
                                <div className="results-summary">
                                    <div className="stat-card"><div className="value">6</div><div className="label">Excel Sheets</div></div>
                                    <div className="stat-card"><div className="value">30</div><div className="label">Days of Content</div></div>
                                    <div className="stat-card"><div className="value">30</div><div className="label">AI Images</div></div>
                                    <div className="stat-card"><div className="value">4</div><div className="label">SEO Blog Posts</div></div>
                                    <div className="stat-card"><div className="value">40</div><div className="label">FB Captions</div></div>
                                </div>
                            </div>
                        </>
                    )}

                    {/* ── SKU MODE ── */}
                    {mode === "sku" && (
                        <>
                            <div className="card">
                                <h2>Product URL</h2>
                                <p className="form-hint">
                                    Paste a product link from <strong>msreadshop.com</strong>. The engine will fetch the product details and generate a complete content pack.
                                </p>
                                <label className="form-label">Product Link</label>
                                <input
                                    type="url"
                                    className="url-input"
                                    placeholder="https://www.msreadshop.com/products/your-product-handle"
                                    value={productUrl}
                                    onChange={(e) => setProductUrl(e.target.value)}
                                />

                                <label className="form-label" style={{ marginTop: "1rem" }}>Creative Direction (Optional)</label>
                                <p className="form-hint">
                                    Add any specific angle, campaign theme, or tone you want the content to follow.
                                </p>
                                <textarea
                                    className="brief-input"
                                    style={{ minHeight: "100px" }}
                                    placeholder="Example: Position this as part of our Hari Raya campaign. Emphasise the festive elegance and size-inclusive fit. Target working moms aged 30-45."
                                    value={brief}
                                    onChange={(e) => setBrief(e.target.value)}
                                />
                                {/* ── Avatar Selection ── */}
                                <div className="avatar-section">
                                    <label className="form-label">Digital Avatar / Model</label>
                                    <p className="form-hint">
                                        Upload your digital avatar(s). Selected avatar(s) will appear as the model wearing the product. Min 1, max 3.
                                    </p>
                                    <div className="avatar-grid">
                                        {[0, 1, 2].map(idx => (
                                            <div key={idx} className={`avatar-slot ${selectedAvatars.has(idx) && avatars[idx] ? "selected" : ""}`}>
                                                {avatars[idx] ? (
                                                    <>
                                                        <img className="avatar-preview" src={avatars[idx]} alt={`Avatar ${idx + 1}`}
                                                            onClick={() => toggleAvatarSelect(idx)} style={{ cursor: "pointer" }} />
                                                        {selectedAvatars.has(idx) && <div className="avatar-badge">Selected</div>}
                                                        <div className="avatar-controls">
                                                            <button className={`select-btn ${selectedAvatars.has(idx) ? "active" : ""}`}
                                                                onClick={() => toggleAvatarSelect(idx)}>
                                                                {selectedAvatars.has(idx) ? "Selected" : "Select"}
                                                            </button>
                                                            <button onClick={() => { avatarFileRefs[idx].current.click(); }}>Replace</button>
                                                            <button className="remove-btn" onClick={() => handleAvatarRemove(idx)}>Remove</button>
                                                        </div>
                                                    </>
                                                ) : (
                                                    <div className="avatar-placeholder" onClick={() => avatarFileRefs[idx].current.click()}>
                                                        <span className="upload-icon">+</span>
                                                        {idx < 2 ? `Avatar ${idx + 1}` : "Custom Avatar"}
                                                        <span style={{ fontSize: "0.7rem", marginTop: "0.3rem" }}>Click to upload</span>
                                                    </div>
                                                )}
                                                <input type="file" accept="image/*" ref={avatarFileRefs[idx]}
                                                    style={{ display: "none" }}
                                                    onChange={(e) => handleAvatarUpload(idx, e)} />
                                            </div>
                                        ))}
                                    </div>
                                    <p className="avatar-hint">
                                        Avatars are saved in your browser. {selectedAvatars.size > 0 ? `${selectedAvatars.size} avatar(s) selected — images will rotate between them.` : "Upload at least one avatar."}
                                    </p>
                                </div>

                                <button className="btn-primary" onClick={handleGenerateSku}
                                    disabled={!productUrl.trim() || (avatars.some(a => a) && selectedAvatars.size === 0)}>
                                    Generate Product Content
                                </button>
                            </div>

                            <div className="card">
                                <h2>What You'll Get</h2>
                                <div className="results-summary">
                                    <div className="stat-card"><div className="value">1</div><div className="label">SEO Blog Post</div></div>
                                    <div className="stat-card"><div className="value">6</div><div className="label">Social Posts</div></div>
                                    <div className="stat-card"><div className="value">4</div><div className="label">Product Descriptions</div></div>
                                    <div className="stat-card"><div className="value">1</div><div className="label">Email Campaign</div></div>
                                    <div className="stat-card"><div className="value">4</div><div className="label">AI Images</div></div>
                                </div>
                            </div>
                        </>
                    )}
                </>
            )}

            {/* ── PROGRESS VIEW ── */}
            {view === "progress" && (
                <>
                    <div className="card">
                        <h2>{activeMode === "sku" ? "Generating Product Content" : "Generating Your Content Pack"}</h2>

                        {/* Product preview (SKU mode) */}
                        {productPreview && (
                            <div className="product-preview">
                                {productPreview.image_url && <img src={productPreview.image_url} alt={productPreview.title} />}
                                <div className="product-info">
                                    <div className="product-name">{productPreview.title}</div>
                                    <div className="product-price">
                                        RM{productPreview.price}
                                        {productPreview.compare_price && <span className="compare">RM{productPreview.compare_price}</span>}
                                    </div>
                                    <div className="product-meta">
                                        {productPreview.product_type && <span>{productPreview.product_type} &bull; </span>}
                                        {productPreview.sizes && <span>Sizes: {productPreview.sizes.join(", ")} &bull; </span>}
                                        {productPreview.colors && <span>{productPreview.colors.join(", ")}</span>}
                                    </div>
                                </div>
                            </div>
                        )}

                        <div className="phase-indicator">
                            {phases.map((p, i) => (
                                <div key={p.key} className={`phase-step ${i < currentPhaseIdx ? "done" : ""} ${i === currentPhaseIdx ? "active" : ""}`}>
                                    {i < currentPhaseIdx ? "\u2713 " : ""}{p.label}
                                </div>
                            ))}
                        </div>
                        <div className="progress-bar-container">
                            <div className="progress-bar-fill" style={{ width: `${overallProgress}%` }} />
                        </div>
                        <p style={{ textAlign: "center", color: "var(--brand-dark-grey)", fontSize: "0.85rem" }}>
                            {Math.round(overallProgress)}% complete
                            {currentPhase === "generating_images" && ` \u2014 Image ${imageProgress.current}/${imageProgress.total}`}
                        </p>
                    </div>

                    {Object.keys(images).length > 0 && (
                        <div className="card">
                            <h2>Image Generation ({imagesDone}/{imageProgress.total})</h2>
                            <div className="image-grid">
                                {Object.entries(images).sort(([a],[b]) => Number(a)-Number(b)).map(([day, img]) => (
                                    <div key={day} className={`image-slot ${img.status}`}>
                                        {img.status === "generating" && <div className="spinner" />}
                                        {img.status === "done" && img.filename && (
                                            <img src={`/api/images/${sessionId}/${img.filename}`} alt={img.theme}
                                                onClick={() => setLightbox(`/api/images/${sessionId}/${img.filename}`)}
                                                style={{ cursor: "pointer" }} />
                                        )}
                                        {img.status === "failed" && <span style={{ color: "var(--error)", fontSize: "0.75rem" }}>Failed</span>}
                                        <div className="label">
                                            <span className="day-badge">{activeMode === "sku" ? `Image ${day}` : `Day ${day}`}</span>
                                            <br />{img.theme}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}

                    <div className="card">
                        <h2>Activity Log</h2>
                        <div className="log-panel" ref={logRef}>
                            {events.map((e, i) => (
                                <div key={i} className={`log-entry ${e.type === "error" ? "error" : e.success === true ? "success" : ""}`}>
                                    <span className="time">{new Date(e.timestamp).toLocaleTimeString()}</span>
                                    {e.message}
                                </div>
                            ))}
                        </div>
                    </div>
                </>
            )}

            {/* ── RESULTS VIEW ── */}
            {view === "results" && (
                <>
                    <div className="card" style={{ textAlign: "center" }}>
                        <h2 style={{ fontSize: "1.4rem", marginBottom: "0.5rem" }}>
                            {activeMode === "sku" ? "Product Content Pack Ready" : "Content Pack Ready"}
                        </h2>
                        <p style={{ color: "var(--brand-dark-grey)" }}>
                            {activeMode === "sku"
                                ? "Blog post, social media posts, product descriptions, and email campaign have been generated."
                                : "Your 30-day content engine has been generated."}
                        </p>

                        {/* Product preview in results (SKU mode) */}
                        {productPreview && (
                            <div className="product-preview" style={{ justifyContent: "center", marginTop: "1rem" }}>
                                {productPreview.image_url && <img src={productPreview.image_url} alt={productPreview.title} />}
                                <div className="product-info" style={{ textAlign: "left" }}>
                                    <div className="product-name">{productPreview.title}</div>
                                    <div className="product-price">
                                        RM{productPreview.price}
                                        {productPreview.compare_price && <span className="compare">RM{productPreview.compare_price}</span>}
                                    </div>
                                </div>
                            </div>
                        )}

                        <div className="results-summary">
                            {activeMode === "sku" ? (
                                <>
                                    <div className="stat-card"><div className="value">5</div><div className="label">Excel Sheets</div></div>
                                    <div className="stat-card"><div className="value">6</div><div className="label">Social Posts</div></div>
                                    <div className="stat-card"><div className="value">{imagesDone}</div><div className="label">AI Images</div></div>
                                    <div className="stat-card"><div className="value">1</div><div className="label">Email Campaign</div></div>
                                </>
                            ) : (
                                <>
                                    <div className="stat-card"><div className="value">6</div><div className="label">Excel Sheets</div></div>
                                    <div className="stat-card"><div className="value">30</div><div className="label">Days Planned</div></div>
                                    <div className="stat-card"><div className="value">{imagesDone}</div><div className="label">AI Images</div></div>
                                    <div className="stat-card"><div className="value">4</div><div className="label">Blog Posts</div></div>
                                    <div className="stat-card"><div className="value">40</div><div className="label">FB Captions</div></div>
                                </>
                            )}
                            {duration && (
                                <div className="stat-card">
                                    <div className="value">{Math.floor(duration/60)}:{String(duration%60).padStart(2,'0')}</div>
                                    <div className="label">Total Time</div>
                                </div>
                            )}
                        </div>
                        <div className="download-section">
                            <button className="btn-download" onClick={() => window.location.href = `/api/download/${sessionId}`}>
                                Download Full Pack (.zip)
                            </button>
                            <button className="btn-download" style={{ background: "var(--brand-black)" }}
                                onClick={() => window.location.href = `/api/download-excel/${sessionId}`}>
                                Download Excel Only
                            </button>
                        </div>
                    </div>

                    {Object.keys(images).length > 0 && (
                        <div className="card">
                            <h2>Generated Images</h2>
                            <div className="image-grid">
                                {Object.entries(images)
                                    .filter(([_, img]) => img.status === "done" && img.filename)
                                    .sort(([a],[b]) => Number(a)-Number(b))
                                    .map(([day, img]) => (
                                        <div key={day} className="image-slot done" style={{ cursor: "pointer" }}
                                            onClick={() => setLightbox(`/api/images/${sessionId}/${img.filename}`)}>
                                            <img src={`/api/images/${sessionId}/${img.filename}`} alt={img.theme} />
                                            <div className="label">
                                                <span className="day-badge">{activeMode === "sku" ? `Image ${day}` : `Day ${day}`}</span>
                                                <br />{img.theme}
                                            </div>
                                        </div>
                                    ))}
                            </div>
                        </div>
                    )}

                    <div style={{ textAlign: "center", marginTop: "1rem" }}>
                        <button className="btn-secondary" onClick={resetToInput}>Generate Another</button>
                    </div>
                </>
            )}

            {lightbox && (
                <div className="lightbox" onClick={() => setLightbox(null)}>
                    <img src={lightbox} alt="Preview" />
                </div>
            )}

            <div className="footer">
                MS. READ &copy; {new Date().getFullYear()} &mdash; Powered by BettieAI &mdash; <a href="https://www.msreadshop.com" target="_blank">msreadshop.com</a>
            </div>
        </div>
    );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
